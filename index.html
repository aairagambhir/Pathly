<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathfinder — Student Academic Planning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Refined slate-gold palette */
  --ink-950:#0a0c10;
  --ink-900:#111318;
  --ink-800:#1a1d24;
  --ink-700:#252830;
  --ink-600:#32363f;
  --ink-500:#4a4f5c;
  --ink-400:#6b7180;
  --ink-300:#959aaa;
  --ink-200:#c4c8d4;
  --ink-100:#e0e3ea;
  --ink-50:#f0f2f5;
  --ink-25:#f7f8fa;

  --gold-700:#7a5a1a;
  --gold-600:#9a7020;
  --gold-500:#b8882a;
  --gold-400:#d4a843;
  --gold-300:#e8c56a;
  --gold-200:#f2daa0;
  --gold-100:#faf0d8;
  --gold-50:#fdf8ee;

  --sage-700:#2a4a3a;
  --sage-600:#3a6450;
  --sage-500:#4a8068;
  --sage-400:#6aa88a;
  --sage-200:#b8d8c8;
  --sage-100:#dff0e8;
  --sage-50:#f0f8f4;

  --azure-700:#1a2e52;
  --azure-600:#1e3d74;
  --azure-500:#2850a0;
  --azure-400:#4472c4;
  --azure-200:#a0bce0;
  --azure-100:#d8e6f4;
  --azure-50:#edf4fc;

  --crimson-600:#8b1a1a;
  --crimson-100:#fde8e8;

  --white:#ffffff;
  --offwhite:#fafaf8;

  --sidebar-w:240px;
  --header-h:60px;

  --r-xs:4px;
  --r-sm:6px;
  --r-md:10px;
  --r-lg:14px;
  --r-xl:20px;
  --r-2xl:28px;

  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-body:'Syne',system-ui,sans-serif;
  --font-mono:'DM Mono',monospace;

  --shadow-xs:0 1px 2px rgba(10,12,16,0.06);
  --shadow-sm:0 2px 8px rgba(10,12,16,0.08);
  --shadow-md:0 4px 20px rgba(10,12,16,0.1);
  --shadow-lg:0 8px 40px rgba(10,12,16,0.14);
  --shadow-xl:0 16px 64px rgba(10,12,16,0.18);

  --trans:150ms cubic-bezier(0.4,0,0.2,1);
}

html,body{height:100%;overflow:hidden;background:var(--ink-25)}
body{font-family:var(--font-body);color:var(--ink-800);font-size:14px;line-height:1.6}

/* ─── LAYOUT ─── */
#app{display:flex;height:100vh;overflow:hidden}

/* ─── SIDEBAR ─── */
.sidebar{
  width:var(--sidebar-w);
  background:var(--ink-900);
  display:flex;flex-direction:column;flex-shrink:0;
  overflow-y:auto;z-index:200;
  border-right:1px solid rgba(255,255,255,0.04);
  position:relative;
}
.sidebar::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(212,168,67,0.15),transparent);
  pointer-events:none;
}
.sidebar-logo{
  padding:22px 20px 18px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  flex-shrink:0;
}
.logo-mark{display:flex;align-items:center;gap:12px}
.logo-icon{
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--azure-500),var(--azure-600));
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 2px 8px rgba(40,80,160,0.4);
}
.logo-icon svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-text{font-family:var(--font-display);font-size:20px;color:#fff;font-weight:600;letter-spacing:0.3px;line-height:1}
.logo-tag{font-family:var(--font-body);font-size:9.5px;color:rgba(255,255,255,0.28);margin-top:3px;letter-spacing:1.2px;text-transform:uppercase;font-weight:500}

.nav-sec{
  padding:18px 16px 6px;
  font-size:9px;color:rgba(255,255,255,0.22);
  text-transform:uppercase;letter-spacing:1.8px;font-weight:600;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;
  margin:1px 8px;
  border-radius:var(--r-sm);
  cursor:pointer;
  color:rgba(255,255,255,0.42);
  font-size:13px;font-weight:500;
  transition:all var(--trans);
  border:none;background:none;
  width:calc(100% - 16px);text-align:left;
  position:relative;
}
.nav-item:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.78)}
.nav-item.active{background:rgba(40,80,160,0.22);color:#fff;}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:60%;background:var(--gold-400);border-radius:0 2px 2px 0;
}
.nav-item svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;opacity:0.85}
.nav-badge{
  margin-left:auto;
  background:linear-gradient(135deg,var(--gold-500),var(--gold-400));
  color:var(--ink-900);
  font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:0.5px;
}
.sidebar-foot{
  margin-top:auto;padding:14px;
  border-top:1px solid rgba(255,255,255,0.05);
}
.s-card{display:flex;align-items:center;gap:10px}
.s-avatar{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--azure-500),var(--sage-500));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:#fff;flex-shrink:0;overflow:hidden;
  border:1.5px solid rgba(255,255,255,0.1);
}
.s-avatar img{width:100%;height:100%;object-fit:cover}
.s-name{font-size:12.5px;color:rgba(255,255,255,0.85);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-grade{font-size:11px;color:rgba(255,255,255,0.3);margin-top:1px}

/* ─── MAIN ─── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  height:var(--header-h);
  background:var(--white);
  border-bottom:1px solid var(--ink-100);
  display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;
  box-shadow:var(--shadow-xs);
}
.topbar-title{font-family:var(--font-display);font-size:18px;font-weight:600;flex:1;color:var(--ink-900);letter-spacing:0.2px;line-height:1.2}
.topbar-sub{font-family:var(--font-body);font-size:11.5px;color:var(--ink-400);margin-top:1px;font-weight:400}
.content{flex:1;overflow-y:auto;padding:28px 28px}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;
  border-radius:var(--r-sm);
  font-family:var(--font-body);font-size:13px;font-weight:600;
  cursor:pointer;border:none;
  transition:all var(--trans);
  letter-spacing:0.2px;
}
.btn-primary{
  background:var(--ink-900);color:#fff;
  box-shadow:0 1px 3px rgba(10,12,16,0.2);
}
.btn-primary:hover{background:var(--ink-700);box-shadow:var(--shadow-sm)}
.btn-gold{
  background:linear-gradient(135deg,var(--gold-500),var(--gold-400));
  color:var(--ink-900);
  box-shadow:0 2px 8px rgba(184,136,42,0.3);
}
.btn-gold:hover{box-shadow:0 4px 14px rgba(184,136,42,0.4);transform:translateY(-1px)}
.btn-outline{
  background:transparent;color:var(--ink-700);
  border:1.5px solid var(--ink-200);
}
.btn-outline:hover{border-color:var(--ink-400);color:var(--ink-900);background:var(--ink-50)}
.btn-ghost{background:transparent;color:var(--ink-500);border:none}
.btn-ghost:hover{background:var(--ink-50);color:var(--ink-800)}
.btn-azure{background:var(--azure-500);color:#fff;box-shadow:0 2px 8px rgba(40,80,160,0.3)}
.btn-azure:hover{background:var(--azure-600);box-shadow:0 4px 14px rgba(40,80,160,0.4)}
.btn-danger{background:transparent;color:var(--crimson-600);border:1.5px solid var(--crimson-100)}
.btn-danger:hover{background:var(--crimson-100)}
.btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:11.5px}

/* ─── CARDS ─── */
.card{
  background:var(--white);
  border-radius:var(--r-lg);
  border:1px solid var(--ink-100);
  padding:22px;
  box-shadow:var(--shadow-xs);
}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--ink-900);letter-spacing:0.2px}
.card-sub{font-size:12px;color:var(--ink-400);margin-top:2px;font-weight:400}

/* ─── GRIDS ─── */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1000px){.g3{grid-template-columns:repeat(2,1fr)}.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:0.3px}
.b-azure{background:var(--azure-100);color:var(--azure-600)}
.b-gold{background:var(--gold-100);color:var(--gold-700)}
.b-sage{background:var(--sage-100);color:var(--sage-700)}
.b-ink{background:var(--ink-100);color:var(--ink-600)}
.b-crimson{background:var(--crimson-100);color:var(--crimson-600)}

/* ─── STAT CARDS ─── */
.stat{
  background:var(--white);
  border:1px solid var(--ink-100);
  border-radius:var(--r-lg);
  padding:18px 20px;
  box-shadow:var(--shadow-xs);
  position:relative;overflow:hidden;
}
.stat::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(to right,var(--azure-400),var(--azure-500));
  border-radius:var(--r-lg) var(--r-lg) 0 0;
}
.stat-lbl{font-size:10.5px;color:var(--ink-400);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px}
.stat-val{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--ink-900);line-height:1}
.stat-hint{font-size:11.5px;color:var(--ink-400);margin-top:6px}

/* ─── PROGRESS ─── */
.prog-track{height:4px;background:var(--ink-100);border-radius:99px;overflow:hidden;margin-top:10px}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(to right,var(--azure-500),var(--azure-400));transition:width .6s cubic-bezier(0.4,0,0.2,1)}

/* ─── CHECKLIST ─── */
.check{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-bottom:1px solid var(--ink-50)}
.check:last-child{border-bottom:none}
.chk-box{
  width:18px;height:18px;border-radius:5px;
  border:1.5px solid var(--ink-200);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;margin-top:2px;
  transition:all var(--trans);
}
.chk-box svg{width:10px;height:10px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0}
.chk-box.on{background:var(--azure-500);border-color:var(--azure-500)}
.chk-box.on svg{opacity:1}
.chk-lbl{font-size:13.5px;color:var(--ink-700);line-height:1.45;font-weight:500}
.chk-lbl.done{text-decoration:line-through;color:var(--ink-300)}
.chk-meta{font-size:11.5px;color:var(--ink-400);margin-top:3px;font-weight:400}

/* ─── TIMELINE ─── */
.timeline{position:relative;padding-left:22px}
.timeline::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:1.5px;background:var(--ink-100)}
.tl-item{position:relative;padding:0 0 18px 16px}
.tl-dot{position:absolute;left:-22px;top:5px;width:13px;height:13px;border-radius:50%;border:2.5px solid var(--white);outline:2px solid var(--ink-200);background:var(--ink-200);box-shadow:var(--shadow-xs)}
.tl-dot.done{background:var(--sage-500);outline-color:var(--sage-400)}
.tl-dot.current{background:var(--gold-400);outline-color:var(--gold-300);box-shadow:0 0 0 4px rgba(212,168,67,0.15)}
.tl-dot.up{background:var(--white);outline-color:var(--ink-200)}
.tl-mon{font-size:10px;color:var(--ink-400);font-weight:600;text-transform:uppercase;letter-spacing:0.9px;margin-bottom:2px}
.tl-title{font-size:13.5px;font-weight:600;color:var(--ink-800)}
.tl-desc{font-size:12px;color:var(--ink-500);margin-top:2px;line-height:1.5}
.tl-now{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:var(--gold-600);background:var(--gold-50);border:1px solid var(--gold-200);padding:2px 8px;border-radius:10px;margin-top:5px}

/* ─── RESOURCE ROWS ─── */
.res-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 0;border-bottom:1px solid var(--ink-50);
  cursor:pointer;text-decoration:none;color:inherit;
  transition:all var(--trans);border-radius:var(--r-sm);
}
.res-row:last-child{border-bottom:none}
.res-row:hover .res-name{color:var(--azure-500)}
.res-ico{width:36px;height:36px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.res-ico svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.res-name{font-size:13.5px;font-weight:600;color:var(--ink-800);transition:color var(--trans)}
.res-desc{font-size:12px;color:var(--ink-400)}
.res-arrow{margin-left:auto;color:var(--ink-200);font-size:20px;line-height:1}

/* ─── OPPORTUNITY CARDS ─── */
.opp{
  background:var(--white);border:1px solid var(--ink-100);
  border-radius:var(--r-lg);padding:18px;
  transition:all var(--trans);
  box-shadow:var(--shadow-xs);
}
.opp:hover{border-color:var(--azure-200);box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.opp-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.opp-title{font-size:13.5px;font-weight:700;color:var(--ink-900)}
.opp-org{font-size:12px;color:var(--ink-400);margin-top:2px}
.opp-amt{font-size:13px;font-weight:700;color:var(--sage-600);flex-shrink:0;white-space:nowrap}
.opp-body{font-size:12.5px;color:var(--ink-600);margin-bottom:14px;line-height:1.65}
.opp-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.dead-tag{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink-400)}
.dead-tag svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ─── CALENDAR ─── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-hdr{text-align:center;font-size:10px;color:var(--ink-400);font-weight:600;padding:8px 0;text-transform:uppercase;letter-spacing:0.6px}
.cal-day{
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:var(--r-sm);font-size:12.5px;font-weight:500;
  position:relative;cursor:pointer;transition:all var(--trans);color:var(--ink-700);
}
.cal-day:hover{background:var(--ink-50)}
.cal-day.today{background:var(--ink-900);color:#fff;font-weight:700}
.cal-day.has-ev::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--azure-400)}
.cal-day.today.has-ev::after{background:rgba(255,255,255,0.55)}
.cal-day.other{color:var(--ink-200)}
.cal-day.selected{background:var(--azure-50);color:var(--azure-600);font-weight:700;outline:1.5px solid var(--azure-200)}
.cal-day.selected.today{background:var(--ink-900);color:#fff;outline:none}

.ev-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 14px;border-radius:var(--r-sm);
  border-left:3px solid;margin-bottom:7px;
  background:var(--white);
  border-top:1px solid var(--ink-50);border-right:1px solid var(--ink-50);border-bottom:1px solid var(--ink-50);
  transition:all var(--trans);
}
.ev-item:hover{box-shadow:var(--shadow-sm)}
.ev-item.test{border-left-color:var(--azure-400)}
.ev-item.scholarship{border-left-color:var(--gold-400)}
.ev-item.program{border-left-color:var(--sage-400)}
.ev-item.school{border-left-color:var(--ink-500)}
.ev-item.custom{border-left-color:var(--crimson-600)}
.ev-item.past{opacity:0.45}
.ev-date-block{text-align:center;min-width:40px;flex-shrink:0}
.ev-day-num{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--ink-900);line-height:1}
.ev-mon-abbr{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--ink-400);margin-top:1px}
.ev-name{font-size:12.5px;color:var(--ink-700);flex:1;line-height:1.45;font-weight:500}
.ev-type{font-size:10.5px;color:var(--ink-400);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.ev-past-label{font-size:10px;color:var(--ink-300);margin-top:3px;font-style:italic}
.ev-del{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--ink-200);font-size:16px;padding:2px 6px;border-radius:4px;align-self:center;transition:all var(--trans)}
.ev-del:hover{color:var(--crimson-600);background:var(--crimson-100)}
.selected-date-label{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--ink-900);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--ink-100)}
.cal-events-panel{max-height:380px;overflow-y:auto}

/* ─── CHAT ─── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - var(--header-h) - 56px)}
.chat-msgs{flex:1;overflow-y:auto;padding:0 0 18px;display:flex;flex-direction:column;gap:12px}
.bubble{max-width:82%;display:flex;flex-direction:column;gap:4px}
.bubble.user{align-self:flex-end;align-items:flex-end}
.bubble.ai{align-self:flex-start}
.bubble-c{padding:13px 17px;border-radius:var(--r-lg);font-size:13.5px;line-height:1.7}
.bubble.user .bubble-c{
  background:var(--ink-900);color:#fff;
  border-radius:var(--r-lg) var(--r-lg) 5px var(--r-lg);
}
.bubble.ai .bubble-c{
  background:var(--white);color:var(--ink-800);
  border:1px solid var(--ink-100);
  border-radius:var(--r-lg) var(--r-lg) var(--r-lg) 5px;
  box-shadow:var(--shadow-xs);
}
.bubble-who{font-size:10.5px;color:var(--ink-400);font-weight:600;padding:0 3px;text-transform:uppercase;letter-spacing:0.6px}
.chat-in-area{
  background:var(--white);border:1.5px solid var(--ink-200);
  border-radius:var(--r-lg);padding:14px;
  display:flex;flex-direction:column;gap:10px;
  box-shadow:var(--shadow-sm);
}
.chat-in-area:focus-within{border-color:var(--azure-300)}
.chat-in{
  border:none;outline:none;font-family:var(--font-body);font-size:13.5px;
  color:var(--ink-900);resize:none;min-height:44px;max-height:120px;
  background:transparent;width:100%;line-height:1.6;
}
.chat-in-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.sugg-chips{display:flex;gap:5px;flex-wrap:wrap}
.sugg{
  padding:5px 11px;border:1.5px solid var(--ink-100);
  border-radius:20px;font-size:11.5px;cursor:pointer;
  color:var(--ink-500);background:var(--ink-25);
  transition:all var(--trans);font-weight:500;
}
.sugg:hover{border-color:var(--azure-300);color:var(--azure-500);background:var(--azure-50)}
.think{display:flex;gap:5px;align-items:center;padding:14px 17px}

.ai-bar{

/* ─── AUTH MODAL ─── */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(10,12,16,0.7);

  backdrop-filter:blur(6px);
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--white);border-radius:var(--r-xl);
  padding:36px;max-width:440px;width:calc(100% - 32px);
  box-shadow:var(--shadow-xl);
  animation:slideUp .22s cubic-bezier(0.34,1.56,0.64,1);
  max-height:calc(100vh - 40px);overflow-y:auto;
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-logo{
  width:44px;height:44px;background:var(--ink-900);border-radius:12px;
  display:flex;align-items:center;justify-content:center;

}
.modal-logo svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.modal h2{font-family:var(--font-display);font-size:24px;color:var(--ink-900);text-align:center;margin-bottom:6px;font-weight:600}
.modal-sub{font-size:13px;color:var(--ink-400);text-align:center;margin-bottom:28px;line-height:1.6}
.modal-tabs{display:flex;border:1.5px solid var(--ink-100);border-radius:var(--r-sm);overflow:hidden;margin-bottom:24px}
.modal-tab{
  flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;
  background:transparent;border:none;color:var(--ink-500);
  font-family:var(--font-body);transition:all var(--trans);
}
.modal-tab.on{background:var(--ink-900);color:#fff}
.f-group{margin-bottom:16px}
.f-label{display:block;font-size:12px;font-weight:700;color:var(--ink-600);margin-bottom:6px;letter-spacing:0.3px;text-transform:uppercase}
.f-input{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--ink-200);border-radius:var(--r-sm);
  font-family:var(--font-body);font-size:14px;color:var(--ink-900);
  background:var(--white);transition:border-color var(--trans);outline:none;
}
.f-input:focus{border-color:var(--azure-400);box-shadow:0 0 0 3px rgba(40,80,160,0.08)}
.f-input::placeholder{color:var(--ink-300)}
.modal-divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--ink-300);font-size:11.5px;font-weight:500}
.modal-divider::before,.modal-divider::after{content:'';flex:1;height:1px;background:var(--ink-100)}
.google-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:11px 18px;border:1.5px solid var(--ink-200);
  border-radius:var(--r-sm);background:var(--white);
  font-family:var(--font-body);font-size:13.5px;font-weight:600;
  color:var(--ink-800);cursor:pointer;transition:all var(--trans);width:100%;
}
.google-btn:hover{border-color:var(--ink-400);box-shadow:var(--shadow-sm);background:var(--ink-25)}
.google-btn svg{width:18px;height:18px;flex-shrink:0}
.auth-msg{font-size:12px;text-align:center;margin-top:12px;padding:8px;border-radius:var(--r-sm)}
.auth-msg.err{background:var(--crimson-100);color:var(--crimson-600)}
.auth-msg.ok{background:var(--sage-100);color:var(--sage-700)}
.gcfg-note{font-size:11px;color:var(--ink-400);background:var(--ink-25);border:1px solid var(--ink-100);border-radius:var(--r-sm);padding:9px 11px;margin-bottom:14px;line-height:1.55}

/* ─── LANDING ─── */
.landing-wrap{overflow-y:auto;height:100%;background:var(--white)}
.hero{
  background:var(--ink-900);
  padding:72px 48px 80px;text-align:center;
  position:relative;overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(40,80,160,0.2) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(74,128,104,0.12) 0%,transparent 50%),
    radial-gradient(ellipse 40% 30% at 20% 80%,rgba(212,168,67,0.08) 0%,transparent 50%);
}
.hero-grid{
  position:absolute;inset:0;pointer-events:none;opacity:0.04;
  background-image:linear-gradient(rgba(255,255,255,0.5) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.5) 1px,transparent 1px);
  background-size:48px 48px;
}
.hero-content{position:relative;z-index:1}
.hero-chip{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.55);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;padding:6px 16px;
  font-size:11px;margin-bottom:24px;letter-spacing:0.6px;font-weight:500;text-transform:uppercase;
}
.hero h1{
  font-family:var(--font-display);
  font-size:clamp(32px,5.5vw,56px);color:#fff;
  line-height:1.08;max-width:700px;margin:0 auto 20px;
  font-weight:700;letter-spacing:0.5px;
}
.hero h1 em{color:var(--gold-300);font-style:italic}
.hero-sub{
  font-size:15.5px;color:rgba(255,255,255,0.45);
  max-width:500px;margin:0 auto 36px;line-height:1.75;font-weight:400;
}
.hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.hero-stats{
  display:flex;gap:52px;justify-content:center;
  margin-top:60px;flex-wrap:wrap;
  border-top:1px solid rgba(255,255,255,0.07);
  padding-top:44px;
}
.hs-num{font-family:var(--font-display);font-size:32px;font-weight:700;color:#fff}
.hs-lbl{font-size:11px;color:rgba(255,255,255,0.3);margin-top:3px;text-transform:uppercase;letter-spacing:0.8px}
.features-section{padding:72px 48px;max-width:1100px;margin:0 auto}
.feat-eyebrow{font-size:11px;font-weight:700;color:var(--azure-500);text-transform:uppercase;letter-spacing:1.8px;margin-bottom:10px}
.feat-title{font-family:var(--font-display);font-size:36px;color:var(--ink-900);margin-bottom:44px;font-weight:700;line-height:1.15}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.feat-card{
  background:var(--white);border:1px solid var(--ink-100);
  border-radius:var(--r-xl);padding:26px;
  transition:all .2s ease;
}
.feat-card:hover{border-color:var(--azure-200);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.feat-ico{
  width:44px;height:44px;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;margin-bottom:16px;
}
.feat-ico svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.feat-ttl{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--ink-900)}
.feat-desc{font-size:13px;color:var(--ink-500);line-height:1.7}
.cta-section{
  background:var(--ink-900);padding:64px 48px;text-align:center;
  position:relative;overflow:hidden;
}
.cta-section::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 80% at 50% 50%,rgba(40,80,160,0.2) 0%,transparent 60%);
}
.cta-section h2{font-family:var(--font-display);font-size:34px;color:#fff;margin-bottom:14px;font-weight:700;position:relative;z-index:1}
.cta-section p{color:rgba(255,255,255,0.45);margin-bottom:28px;font-size:15px;position:relative;z-index:1}

/* ─── PROFILE SETUP ─── */
.pf-wrap{max-width:640px;margin:0 auto}
.f-label-pf{display:block;font-size:12px;font-weight:700;color:var(--ink-600);margin-bottom:7px;letter-spacing:0.3px;text-transform:uppercase}
.f-hint{font-size:12px;color:var(--ink-400);margin-bottom:8px}
.f-input-pf,.f-select,.f-textarea{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--ink-200);border-radius:var(--r-sm);
  font-family:var(--font-body);font-size:14px;color:var(--ink-900);
  background:var(--white);transition:border-color var(--trans);outline:none;
}
.f-input-pf:focus,.f-select:focus,.f-textarea:focus{border-color:var(--azure-400);box-shadow:0 0 0 3px rgba(40,80,160,0.08)}
.f-textarea{min-height:78px;resize:vertical;line-height:1.6}
.grade-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.grade-btn{
  padding:12px;border:1.5px solid var(--ink-200);border-radius:var(--r-sm);
  background:var(--white);font-family:var(--font-body);font-size:14px;font-weight:600;
  color:var(--ink-600);cursor:pointer;text-align:center;transition:all var(--trans);
}
.grade-btn:hover{border-color:var(--azure-400);color:var(--azure-500)}
.grade-btn.sel{background:var(--ink-900);color:#fff;border-color:var(--ink-900)}
.int-grid{display:flex;flex-wrap:wrap;gap:7px}
.int-tag{
  padding:7px 14px;border:1.5px solid var(--ink-200);border-radius:20px;
  font-size:12.5px;cursor:pointer;transition:all var(--trans);
  color:var(--ink-600);background:var(--white);font-weight:500;
}
.int-tag:hover{border-color:var(--azure-300);color:var(--azure-500)}
.int-tag.sel{background:var(--azure-50);border-color:var(--azure-300);color:var(--azure-700);font-weight:600}
.steps{display:flex;align-items:center;margin-bottom:26px}
.step-c{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;z-index:1}
.step-c.done{background:var(--sage-500);color:#fff}
.step-c.active{background:var(--ink-900);color:#fff}
.step-c.pend{background:var(--ink-50);color:var(--ink-400);border:1.5px solid var(--ink-200)}
.step-line{flex:1;height:2px;background:var(--ink-100)}
.step-line.done{background:var(--sage-400)}

/* ─── TEST PREP ─── */
.test-badge{padding:4px 11px;border-radius:6px;font-family:var(--font-mono);font-size:12px;font-weight:500;letter-spacing:0.3px}
.t-sat{background:var(--azure-100);color:var(--azure-700)}
.t-act{background:var(--gold-100);color:var(--gold-700)}
.s-score{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--ink-50)}
.s-score:last-child{border-bottom:none}

/* ─── COLLEGE SEARCH ─── */
.search-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--white);border:1.5px solid var(--ink-200);
  border-radius:var(--r-md);padding:11px 16px;
  box-shadow:var(--shadow-xs);transition:border-color var(--trans);
}
.search-bar:focus-within{border-color:var(--azure-400);box-shadow:0 0 0 3px rgba(40,80,160,0.08)}
.search-bar svg{width:17px;height:17px;fill:none;stroke:var(--ink-400);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.search-input{border:none;outline:none;font-family:var(--font-body);font-size:14px;color:var(--ink-900);background:transparent;width:100%}
.search-input::placeholder{color:var(--ink-300)}
.search-clear{background:none;border:none;cursor:pointer;color:var(--ink-300);font-size:18px;line-height:1;padding:0 4px}
.search-clear:hover{color:var(--ink-600)}
.col-row{
  display:flex;align-items:flex-start;gap:14px;
  padding:14px 16px;border:1px solid var(--ink-100);
  border-radius:var(--r-md);background:var(--white);
  margin-bottom:8px;transition:all var(--trans);
}
.col-row:hover{border-color:var(--azure-200);box-shadow:var(--shadow-xs)}
.col-info{flex:1;min-width:0}
.col-name{font-size:14px;font-weight:700;color:var(--ink-900)}
.col-meta{font-size:11.5px;color:var(--ink-400);margin-top:2px}
.col-desc{font-size:12.5px;color:var(--ink-600);margin-top:6px;line-height:1.6}
.col-add{flex-shrink:0;align-self:center}
.added-pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--sage-600);background:var(--sage-100);padding:6px 12px;border-radius:20px}
.added-pill svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.empty-state{text-align:center;padding:40px 20px;color:var(--ink-300)}
.empty-state-big{font-family:var(--font-display);font-size:18px;color:var(--ink-500);margin-bottom:6px;font-weight:600}
.mylist-card{
  background:linear-gradient(135deg,var(--azure-50),#f8fbff);
  border:1px solid var(--azure-200);border-radius:var(--r-lg);padding:18px;
}
.mylist-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 0;border-bottom:1px solid var(--azure-100);
}
.mylist-item:last-child{border-bottom:none}

/* ─── MOBILE ─── */
.mob-toggle{display:none;background:none;border:none;cursor:pointer;padding:5px;color:var(--ink-600);font-size:22px}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);box-shadow:none}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.25)}
  .mob-toggle{display:flex}
  .hero{padding:44px 22px 56px}
  .features-section{padding:44px 22px}
  .hero-stats{gap:28px}
  .content{padding:18px}
}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150}
.overlay.show{display:block}

/* ─── UTIL ─── */
.page{animation:fadeUp .2s cubic-bezier(0.4,0,0.2,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}.mb32{margin-bottom:32px}
.flex{display:flex}.items-c{align-items:center}.gap8{gap:8px}.gap12{gap:12px}
.flex-b{display:flex;align-items:center;justify-content:space-between}
.text-sm{font-size:12px}.muted{color:var(--ink-400)}.w100{width:100%}
.divider{height:1px;background:var(--ink-50);margin:16px 0}
a{color:var(--azure-500);text-decoration:none}a:hover{text-decoration:underline}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ink-100);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--ink-200)}
.icon svg{fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ─── COLLEGE SEARCH PAGE ─── */
.col-search-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--white);border:1.5px solid var(--ink-200);
  border-radius:var(--r-md);padding:12px 16px;
  box-shadow:var(--shadow-xs);transition:border-color var(--trans);
}
.col-search-bar:focus-within{border-color:var(--azure-400);box-shadow:0 0 0 3px rgba(40,80,160,0.08)}
.col-search-bar svg{width:18px;height:18px;fill:none;stroke:var(--ink-400);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.col-search-in{border:none;outline:none;font-family:var(--font-body);font-size:14px;color:var(--ink-900);background:transparent;width:100%}
.col-search-in::placeholder{color:var(--ink-300)}
.col-results{max-height:520px;overflow-y:auto;margin-top:4px}
.col-row{
  display:flex;align-items:flex-start;gap:14px;
  padding:13px 14px;border-bottom:1px solid var(--ink-50);
  transition:background var(--trans);border-radius:var(--r-sm);
}
.col-row:last-child{border-bottom:none}
.col-row:hover{background:var(--ink-25)}
.col-logo{
  width:40px;height:40px;border-radius:var(--r-sm);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:16px;font-weight:700;color:#fff;
}
.col-info{flex:1;min-width:0}
.col-name{font-size:13.5px;font-weight:700;color:var(--ink-900);line-height:1.3}
.col-meta{font-size:11.5px;color:var(--ink-400);margin-top:2px}
.col-desc{font-size:12px;color:var(--ink-600);margin-top:5px;line-height:1.55}
.col-add-btn{
  flex-shrink:0;align-self:center;
  width:34px;height:34px;border-radius:50%;
  border:1.5px solid var(--ink-200);background:var(--white);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all var(--trans);color:var(--ink-500);
}
.col-add-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.col-add-btn:hover{border-color:var(--azure-400);color:var(--azure-500);background:var(--azure-50)}
.col-add-btn.added{background:var(--sage-500);border-color:var(--sage-500);color:#fff}
.col-add-btn.added:hover{background:var(--crimson-600);border-color:var(--crimson-600);color:#fff}
.col-empty{text-align:center;padding:40px 20px;color:var(--ink-300);font-size:13.5px}
.col-cat-pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:0.4px;margin-left:6px}
.col-list-card .opp-title{display:flex;align-items:center}
.col-cat-select{
  border:1.5px solid var(--ink-200);border-radius:var(--r-xs);

  padding:3px 8px;background:var(--white);cursor:pointer;outline:none;

.col-filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.col-filter{
  padding:6px 13px;border:1.5px solid var(--ink-100);border-radius:20px;

  transition:all var(--trans);font-weight:600;
}
.col-filter:hover{border-color:var(--azure-300);color:var(--azure-500)}
.col-filter.on{background:var(--ink-900);color:#fff;border-color:var(--ink-900)}

/* ─── ADD EVENT MODAL / CUSTOM EVENTS ─── */
.ev-item.custom{border-left-color:var(--crimson-600)}
.ev-custom-tag{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;color:var(--crimson-600);background:var(--crimson-100);padding:1px 6px;border-radius:8px;margin-left:6px;text-transform:uppercase;letter-spacing:0.4px}
.ev-del{
  margin-left:auto;align-self:center;flex-shrink:0;

  color:var(--ink-300);transition:all var(--trans);

/* logo image inside col-logo */

.col-logo-img img{width:100%;height:100%;object-fit:contain;display:block}

.tp-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tp-tab{
  padding:7px 16px;border:1.5px solid var(--ink-100);border-radius:20px;
  font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-500);
  background:var(--white);transition:all var(--trans);
}
.tp-tab:hover{border-color:var(--azure-300);color:var(--azure-500)}
.tp-tab.on{background:var(--ink-900);color:#fff;border-color:var(--ink-900)}

.tp-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){.tp-select-grid{grid-template-columns:1fr}}

  border:2px solid var(--ink-100);border-radius:var(--r-lg);padding:20px;
  cursor:pointer;transition:all var(--trans);background:var(--white);position:relative;

};

/* ─── TIME ─── */
const NOW = new Date();
const CY = NOW.getFullYear();
const CM = NOW.getMonth();
const CD = NOW.getDate();
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

/* ─── AUTH ─── */
/* Manual auth: stored in localStorage as email→{name,email,pwHash,profileData,checks} */
/* Google auth: stored keyed by google sub */

function hashPw(pw) {
  // Simple deterministic hash (good enough for local storage demo)
  let h = 5381;
  for (let i = 0; i < pw.length; i++) h = ((h << 5) + h) ^ pw.charCodeAt(i);
  return (h >>> 0).toString(16);
}

const AUTH = {
  // Load account by email
  loadByEmail(email) {
    try { return JSON.parse(localStorage.getItem('pf_user_' + email.toLowerCase())); } catch { return null; }
  },
  // Load account by Google sub
  loadByGoogle(sub) {
    const key = localStorage.getItem('pf_google_' + sub);
    if (key) return this.loadByEmail(key);
    return null;
  },
  // Save account
  save(user) {
    localStorage.setItem('pf_user_' + user.email.toLowerCase(), JSON.stringify(user));
  },
  // Link google sub to email
  linkGoogle(sub, email) {
    localStorage.setItem('pf_google_' + sub, email.toLowerCase());
  },
  // Register new user
  register(name, email, pw) {
    const existing = this.loadByEmail(email);
    if (existing) return { ok: false, msg: 'An account with this email already exists.' };
    const user = { name, email: email.toLowerCase(), pwHash: hashPw(pw), account: null, checks: {} };
    this.save(user);
    return { ok: true, user };
  },
  // Login
  login(email, pw) {
    const user = this.loadByEmail(email);
    if (!user) return { ok: false, msg: 'No account found with this email.' };
    if (user.pwHash !== hashPw(pw)) return { ok: false, msg: 'Incorrect password.' };
    return { ok: true, user };
  }
};

/* ─── STATE ─── */
const S = {
  page: 'landing',
  user: null,         // { name, email, pwHash?, account, checks, googleSub? }
  googleUser: null,   // Google JWT payload
  chat: [{ role: 'ai', text: "Hello — I'm your Pathfinder advisor, here to help you navigate college planning, test prep, scholarships, and more.\n\nWhat's on your mind today?" }],
  pfStep: 1,
  pfData: { name:'', grade:'', age:'', interests:[], colleges:'', courses:'', testStatus:'' },
  _editMode: false,
  calViewYear: CY,
  calViewMonth: CM,
  calSelectedDay: null,
};

function saveUser() {
  if (!S.user) return;
  AUTH.save(S.user);
}

// Try to restore session
(function restoreSession() {
  try {
    const lastEmail = localStorage.getItem('pf_session');
    if (lastEmail) {
      const user = AUTH.loadByEmail(lastEmail);
      if (user) {
        S.user = user;
        if (user.account) S.pfStep = 1;
      }
    }
  } catch {}
})();

function setSession(user) {
  S.user = user;
  localStorage.setItem('pf_session', user.email);
}

function clearSession() {
  S.user = null;
  S.googleUser = null;
  localStorage.removeItem('pf_session');
  S.pfStep = 1;
  S._editMode = false;
}

/* ─── GOOGLE AUTH ─── */
/*
  SETUP (required for Google Sign-In to work — this is the ONLY step that can't be done in code):
  1. Go to https://console.cloud.google.com/  →  create/select a project.
  2. APIs & Services → Credentials → Create Credentials → OAuth client ID.
  3. Application type: "Web application".
  4. Under "Authorized JavaScript origins" add the EXACT origin you serve this file from,
     e.g. http://localhost:5500  and/or  https://yourdomain.com  (no trailing slash, no path).
  5. Copy the generated Client ID and paste it below, replacing YOUR_GOOGLE_CLIENT_ID.
  Until you do this, Google will reject sign-in with an origin/client error — that is expected
  and is not a bug in this code. Email sign-up below works with no setup.
*/
const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID';
const GOOGLE_READY = typeof GOOGLE_CLIENT_ID === 'string'
  && GOOGLE_CLIENT_ID.length > 0
  && GOOGLE_CLIENT_ID !== 'YOUR_GOOGLE_CLIENT_ID';

/* Safe pure-JS base64url JWT decoder — no external libs, handles unicode + url-safe chars */
function decodeJwt(token) {
  try {
    const part = token.split('.')[1];
    if (!part) return null;
    let b64 = part.replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4) b64 += '=';
    const json = decodeURIComponent(
      atob(b64).split('').map(ch => '%' + ('00' + ch.charCodeAt(0).toString(16)).slice(-2)).join('')
    );
    return JSON.parse(json);
  } catch (e) {
    console.error('JWT decode failed:', e);
    return null;
  }
}

function initGoogle() {
  if (typeof google === 'undefined' || !google.accounts?.id) return;
  if (!GOOGLE_READY) return; // don't initialize with a placeholder id — avoids console errors
  try {
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleCredentialResponse,
      auto_select: false,
      cancel_on_tap_outside: true,
    });
  } catch (e) {
    console.error('Google init error:', e);
  }
}

/* Primary credential callback (named per spec) */
function handleCredentialResponse(response) {
  const payload = decodeJwt(response?.credential || '');
  if (!payload) { console.error('No payload from Google credential'); return; }

  S.googleUser = payload; // contains name, email, picture, sub
  let user = AUTH.loadByGoogle(payload.sub);
  if (!user) {
    const email = (payload.email || '').toLowerCase();
    user = AUTH.loadByEmail(email);
    if (!user) {
      user = {
        name: payload.name || 'Google User',
        email,
        pwHash: null,
        account: null,
        checks: {},
        googleSub: payload.sub,
        picture: payload.picture || null,
      };
      AUTH.save(user);
    }
    AUTH.linkGoogle(payload.sub, email);
  }
  user.googleSub = payload.sub;
  user.picture = payload.picture || user.picture || null;
  AUTH.save(user);
  setSession(user);

  closeModal();
  renderNav();           // injects avatar img + name + email into .sidebar-foot
  injectGoogleProfile(); // belt-and-suspenders direct injection
  nav(user.account ? 'dashboard' : 'profile');
}

/* Keep the old name working in case anything references it */
function onGoogleSignIn(response) { return handleCredentialResponse(response); }

/* Directly inject authentic Google profile into the sidebar foot fields */
function injectGoogleProfile() {
  const g = S.googleUser;
  if (!g) return;
  const av = document.getElementById('nav-av');
  const nm = document.getElementById('nav-nm');
  const gr = document.getElementById('nav-gr');
  if (av && g.picture) av.innerHTML = `<img src="${g.picture}" alt="${g.name || ''}" referrerpolicy="no-referrer">`;
  if (nm && g.name) nm.textContent = g.name;
  if (gr && g.email) gr.textContent = g.email;
}

function signOut() {
  if (typeof google !== 'undefined' && google.accounts?.id) {
    try { google.accounts.id.disableAutoSelect(); } catch {}
  }
  clearSession();
  renderNav();
  nav('landing');
}

/* ─── AUTH MODAL ─── */
let authTab = 'signin';

function showAuthModal(defaultTab = 'signin') {
  authTab = defaultTab;
  const el = document.getElementById('auth-modal');
  if (el) el.remove();
  const m = document.createElement('div');
  m.className = 'modal-bg';
  m.id = 'auth-modal';
  m.innerHTML = buildAuthModal();
  document.body.appendChild(m);
  // Render Google button
  setTimeout(() => {
    const wrap = document.getElementById('g-btn-wrap');
    if (!wrap) return;
    if (typeof google !== 'undefined' && google.accounts?.id && GOOGLE_READY) {
      try {
        google.accounts.id.renderButton(wrap, {
          theme:'outline', size:'large', text:'signin_with', shape:'rectangular', width: 330
        });
        google.accounts.id.prompt();
      } catch (e) {
        console.error('renderButton failed:', e);
        wrap.innerHTML = `<button class="google-btn" onclick="alert('Google Sign-In could not initialize. Check your Client ID and authorized origins.')">${IC.google} Continue with Google</button>`;
      }
    } else {
      wrap.innerHTML = `
        <button class="google-btn" onclick="alert('To enable Google Sign-In, register an OAuth Client ID in Google Cloud Console, authorize this exact origin, and paste the ID into GOOGLE_CLIENT_ID. Email sign-up below works right now.')">
          ${IC.google} Continue with Google
        </button>`;

function buildAuthModal() {
  return `<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-logo"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
    <h2>Welcome to Pathfinder</h2>
    <p class="modal-sub">Plan your academic future. Free, forever.</p>

    <div id="g-btn-wrap" style="display:flex;justify-content:center;margin-bottom:18px"></div>
    <div class="modal-divider">or use email</div>

    <div class="modal-tabs mb20">
      <button class="modal-tab ${authTab==='signin'?'on':''}" onclick="switchAuthTab('signin')">Sign In</button>
      <button class="modal-tab ${authTab==='signup'?'on':''}" onclick="switchAuthTab('signup')">Create Account</button>
    </div>

    <div id="auth-form-wrap">${buildAuthForm()}</div>
    <button class="btn btn-ghost w100" style="justify-content:center;margin-top:10px;font-size:12px;color:var(--ink-400)" onclick="closeModal()">Continue without account</button>
  </div>`;
}

function buildAuthForm() {
  if (authTab === 'signin') {
    return `<div class="f-group"><label class="f-label">Email</label><input class="f-input" id="a-email" type="email" placeholder="you@school.edu" autocomplete="email"></div>
    <div class="f-group" style="position:relative">
      <label class="f-label">Password</label>
      <input class="f-input" id="a-pw" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSignIn()">
    </div>
    <div id="auth-msg"></div>
    <button class="btn btn-primary w100" style="justify-content:center;margin-top:4px" onclick="doSignIn()">Sign In</button>`;
  } else {
    return `<div class="f-group"><label class="f-label">Full Name</label><input class="f-input" id="a-name" type="text" placeholder="First Last" autocomplete="name"></div>
    <div class="f-group"><label class="f-label">Email</label><input class="f-input" id="a-email" type="email" placeholder="you@school.edu" autocomplete="email"></div>
    <div class="f-group">
      <label class="f-label">Password</label>
      <input class="f-input" id="a-pw" type="password" placeholder="Min. 6 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')doSignUp()">
    </div>
    <div id="auth-msg"></div>
    <button class="btn btn-primary w100" style="justify-content:center;margin-top:4px" onclick="doSignUp()">Create Account</button>`;
  }
}

function switchAuthTab(tab) {
  authTab = tab;
  document.getElementById('auth-form-wrap').innerHTML = buildAuthForm();
  document.querySelectorAll('.modal-tab').forEach((t,i) => {
    t.classList.toggle('on', (i===0&&tab==='signin')||(i===1&&tab==='signup'));
  });
}

function showAuthMsg(msg, type='err') {
  const el = document.getElementById('auth-msg');
  if (el) el.innerHTML = `<div class="auth-msg ${type}" style="margin-top:10px">${msg}</div>`;
}

function doSignIn() {
  const email = document.getElementById('a-email')?.value?.trim();
  const pw = document.getElementById('a-pw')?.value;
  if (!email || !pw) return showAuthMsg('Please fill in all fields.');
  const result = AUTH.login(email, pw);
  if (!result.ok) return showAuthMsg(result.msg);
  setSession(result.user);
  closeModal();
  renderNav();
  nav(result.user.account ? 'dashboard' : 'profile');
}

function doSignUp() {
  const name = document.getElementById('a-name')?.value?.trim();
  const email = document.getElementById('a-email')?.value?.trim();
  const pw = document.getElementById('a-pw')?.value;
  if (!name || !email || !pw) return showAuthMsg('Please fill in all fields.');
  if (pw.length < 6) return showAuthMsg('Password must be at least 6 characters.');
  if (!/\S+@\S+\.\S+/.test(email)) return showAuthMsg('Please enter a valid email address.');
  const result = AUTH.register(name, email, pw);
  if (!result.ok) return showAuthMsg(result.msg);
  S.pfData.name = name;
  setSession(result.user);
  closeModal();
  renderNav();
  nav('profile');
}

function closeModal() {
  const m = document.getElementById('auth-modal');
  if (m) m.remove();
}

function getSchoolYear() { return CM >= 7 ? CY : CY - 1; }

function tlDotClass(monStr) {
  const sy = getSchoolYear();
  const abbrs = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const key = monStr.split(/[\s–\-,]/)[0].trim().slice(0,3);
  const mo = abbrs[key];
  if (mo === undefined) return (CM >= 5 && CM <= 7) ? 'current' : (CM > 7 ? 'done' : 'up'); // Summer
  const yr = mo >= 7 ? sy : sy + 1;
  if (yr < CY || (yr === CY && mo < CM)) return 'done';
  if (yr === CY && mo === CM) return 'current';
  return 'up';
}

function renderNav() {
  let html = ''; let last = null;
  PAGES.forEach(p => {
    if (p.group && p.group !== last) { html += `<div class="nav-sec">${p.group}</div>`; last = p.group; }
    else if (!p.group && last !== null) { last = null; }
    const active = S.page === p.id ? 'active' : '';
    const badge = p.badge ? `<span class="nav-badge">${p.badge}</span>` : '';
    html += `<button class="nav-item ${active}" onclick="nav('${p.id}')">${IC[p.icon]||''} <span>${p.label}</span>${badge}</button>`;
  });
  document.getElementById('sb-nav').innerHTML = html;

  const u = S.user;
  const gUser = S.googleUser;
  const av = document.getElementById('nav-av');
  const nm = document.getElementById('nav-nm');
  const gr = document.getElementById('nav-gr');

  if (u) {
    const initials = u.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) || '?';
    if (gUser?.picture) {
      av.innerHTML = `<img src="${gUser.picture}" alt="">`;
    } else {
      av.textContent = initials;
    }
    nm.textContent = u.name;
    gr.textContent = u.account ? (GD[u.account.grade]?.label || '') : 'Complete your profile';
  } else {
    av.textContent = '?';
    nm.textContent = 'Your Profile';
    gr.textContent = 'Sign in to get started';
  }
}

function nav(page) {

/* ═══════════════════ PROFILE ═══════════════════ */

            ${S.googleUser?.picture ? `<img src="${S.googleUser.picture}" style="width:100%;height:100%;object-fit:cover" alt="">` :

          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px">
          ${[['Grade',GD[acct.grade]?.label||'—'],['Age',acct.age||'—'],['Test Status',acct.testStatus||'—'],['Colleges',acct.colleges||'Not specified']].map(([l,v])=>`
            <div style="background:var(--ink-25);border:1px solid var(--ink-100);border-radius:var(--r-sm);padding:12px 14px">
              <div style="font-size:10px;color:var(--ink-400);font-weight:700;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:4px">${l}</div>
              <div style="font-size:13.5px;color:var(--ink-900);font-weight:600">${v}</div>

            ).join('')}
          </div>

        <div class="mb24">

        </div>
        <div class="flex-b">
          <button class="btn btn-outline" onclick="S.pfStep=1;pProfile()">← Back</button>

      ` : `
        <div class="card-title mb20">Almost done</div>
        <div class="mb16">
          <label class="f-label-pf">Current Courses <span class="muted" style="text-transform:none;font-weight:400">(optional)</span></label>
          <textarea class="f-textarea" id="pf-courses" placeholder="e.g. AP Chemistry, English 11, Pre-Calculus...">${d.courses}</textarea>
        </div>
        <div class="mb24">
          <label class="f-label-pf">Standardized Test Status</label>
          <select class="f-select" id="pf-test" style="margin-top:8px">

            <option value="none" ${d.testStatus==='none'?'selected':''}>Haven't taken any yet</option>
            <option value="psat" ${d.testStatus==='psat'?'selected':''}>Took the PSAT</option>
            <option value="sat"  ${d.testStatus==='sat' ?'selected':''}>Took the SAT</option>
            <option value="act"  ${d.testStatus==='act' ?'selected':''}>Took the ACT</option>
            <option value="both" ${d.testStatus==='both'?'selected':''}>Took both SAT and ACT</option>
          </select>
        </div>
        <div class="flex-b">
          <button class="btn btn-outline" onclick="S.pfStep=2;pProfile()">← Back</button>
          <button class="btn btn-primary" onclick="saveProfile()">${S._editMode?'Save Changes':'Create Profile →'}</button>
        </div>
      `}
    </div>
  </div>`;
}

function pickGrade(g) {
  S.pfData.grade = g;
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('sel'));
  event.target.classList.add('sel');
}
function toggleInt(i) {
  const idx = S.pfData.interests.indexOf(i);
  idx >= 0 ? S.pfData.interests.splice(idx,1) : S.pfData.interests.push(i);
  pProfile();
}
function pfNext() {
  if (S.pfStep === 1) {
    S.pfData.name = document.getElementById('pf-name')?.value || S.pfData.name;
    S.pfData.age = document.getElementById('pf-age')?.value || S.pfData.age;
  } else if (S.pfStep === 2) {
    S.pfData.colleges = document.getElementById('pf-colleges')?.value || S.pfData.colleges;
  }
  S.pfStep = Math.min(S.pfStep+1, 3);
  pProfile();
}
function saveProfile() {
  S.pfData.courses = document.getElementById('pf-courses')?.value || S.pfData.courses;
  S.pfData.testStatus = document.getElementById('pf-test')?.value || S.pfData.testStatus;
  if (!S.pfData.name) S.pfData.name = S.user?.name || S.googleUser?.name || 'Student';
  if (!S.pfData.grade) S.pfData.grade = '11';
  const acct = JSON.parse(JSON.stringify(S.pfData));
  if (!S.user) {
    // Guest mode — create a temporary local "user"
    const guest = { name: acct.name, email: 'guest@local', pwHash: null, account: acct, checks: {}, isGuest: true };
    S.user = guest;
  } else {
    S.user.account = acct;
    if (!S.user.checks) S.user.checks = {};
    saveUser();
  }
  S._editMode = false;
  S.pfStep = 1;
  S.pfData = { name:'', grade:'', age:'', interests:[], colleges:'', courses:'', testStatus:'' };
  renderNav();
  nav('dashboard');
}

/* Rule-based offline advisor — used when no /api/chat backend answers.
   Matches keywords to give genuinely useful, grade-aware guidance. */
function advisorFallback(txt) {
  const q = (txt || '').toLowerCase();
  const acct = S.user?.account;
  const grade = acct?.grade;
  const gradeLine = grade ? ` Since you're in **Grade ${grade}**,` : '';
  const has = (...words) => words.some(w => q.includes(w));
  // whole-word match for short, collision-prone tokens (act, sat, ed, ea, hi...)
  const word = (...words) => words.some(w => new RegExp('\\b' + w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\b').test(q));

  // College search / list
  if (has('college list','build a list','reach','match','safety','where should i apply','choosing college','pick a college','college research','research college')) {
    return `Great question. A balanced college list usually has **8–12 schools** split into three tiers:\n\n**Reach** — admit rate well below your profile (apply to a few, not many).\n**Match** — your stats land near their middle 50%.\n**Safety** — you're comfortably above their range *and* you'd be happy to attend.\n\nUse the **College List** page here to search 350+ schools and tag each one Reach / Match / Safety. Free tools to dig deeper: **BigFuture** (College Board) and **Niche.com**.${gradeLine} focus on building the list now and noting each school's deadlines.\n\nWant help deciding whether a specific school is a reach or match for you?`;
  }
  // Early decision / action (check BEFORE sat/act so "early action" isn't caught by "act")
  if (has('early decision','early action','single-choice','restrictive','rolling') || word('ed','ea')) {
    return `Quick breakdown:\n\n**Early Decision (ED)** — *binding*. If admitted, you must enroll and withdraw other applications. Apply ED only to a clear first choice you can afford.\n**Early Action (EA)** — non-binding. You get an early answer but can still compare offers in spring.\n**Restrictive/Single-Choice EA** — non-binding, but limits where else you apply early.\n**Rolling** — decisions issued as applications arrive; apply early for the best shot.\n\nED can modestly boost admit odds but removes your ability to compare financial-aid offers — weigh that carefully. Want help deciding if ED makes sense for your situation?`;
  }
  // Email a teacher / recommendation (check before sat/act so "teacher" doesn't hit "ea")
  if (has('recommendation','rec letter','letter of rec','ask a teacher','counselor','email a teacher','email my teacher','email to')) {
    return `For recommendation requests, ask **in person first**, then follow up with a short email. Ask teachers who know you well (often junior-year core subjects), and ask **early** — by spring of junior year if you can.\n\nA good email: thank them, ask directly if they'd be comfortable writing a *strong* letter, note the deadline, and offer a short "brag sheet" (your goals, a class moment they saw, what you're proud of) to make their job easier.\n\nWant me to draft a polite request email you can adapt?`;
  }
  // SAT / ACT
  if (has('psat','test prep','standardized','superscore','test score') || word('sat','act')) {
    return `For test prep, the best free resources are **Khan Academy** (official SAT partner), the **College Board Bluebook** app (real adaptive practice tests), and **ACT Academy**.\n\nA solid plan: take one full timed practice test to get a baseline, review every question you missed, and drill your weakest area in short focused sessions.${gradeLine} ${grade==='11' ? 'this is the key testing year — aim for the PSAT/NMSQT in October and a real SAT/ACT in spring.' : grade==='12' ? 'if you still need a score, October/November are your last solid windows for regular deadlines.' : 'you have time — treat the PSAT as low-stakes practice.'}\n\nCheck the **Test Prep** page for links. Want a week-by-week study outline?`;
  }
  // Essays
  if (has('essay','personal statement','common app essay','write my','supplemental')) {
    return `I can coach you on essays, but I won't write them for you — admissions officers can spot a voice that isn't yours, and your own story is your biggest advantage.\n\nA strong personal statement usually: starts with a specific moment (not a summary), shows how you *think*, and reveals something not visible elsewhere in your application. Avoid listing achievements — reflect on one.\n\nTry this: write a messy first draft answering "what's a small moment that changed how I see something?" Don't edit while drafting. Then we can refine it together.\n\nWant me to react to a draft or help you brainstorm topics?`;
  }
  // Scholarships / money
  if (has('scholarship','financial aid','fafsa','money','afford','cost','tuition','grant')) {
    return `Smart to think about this early. Key moves:\n\n**FAFSA** opens **October 1** — file it as early as you can; some aid is first-come. Create your FSA ID at StudentAid.gov ahead of time.\n\nFor scholarships, apply **broadly** — local ones (community foundations, employers, civic groups) are far less competitive than national names. One hour a week adds up.\n\nThe **Scholarships** page here lists opportunities filtered to your grade. Always compare **net cost** (after aid), not sticker price.\n\nWant tips on writing a scholarship essay that you can reuse across applications?`;
  }
  // Deadlines / calendar / planning
  if (has('deadline','calendar','when should','timeline','schedule','plan','organize','what should i do')) {
    return `Staying on top of dates is half the battle.${gradeLine} here's the rhythm:\n\n**Fall** — testing (PSAT/SAT/ACT), early-application deadlines (Nov 1–15).\n**Winter** — regular deadlines (often Jan 1–15), FAFSA.\n**Spring** — decisions arrive, compare aid, deposit by May 1.\n\nUse the **Calendar** page — you can now click any day and add your own deadlines (essay due dates, visits, etc.), and they're saved to your account. Want me to suggest which deadlines matter most for you right now?`;
  }
  // Internships / programs / extracurriculars
  if (has('internship','program','extracurricular','volunteer','summer','activity','club','research')) {
    return `Depth beats breadth — colleges value sustained commitment and growth over a long list. One or two activities where you take on responsibility say more than ten you barely touch.${gradeLine} ${grade==='9'||grade==='10' ? 'now is the time to explore and find what you genuinely care about.' : 'aim for leadership or a tangible project in what you already do.'}\n\nThe **Internships** page lists programs filtered to your grade. For summer, look at free/funded options early — many close in winter. Want ideas matched to your interests?`;
  }
  // Greeting / vague
  if ((word('hi','hello','hey') || has('help','get started','where do i start')) && q.length < 40) {
    return `Hi! I'm your Pathfinder advisor.${gradeLine} I can help with college lists, SAT/ACT prep, essays, scholarships, deadlines, and planning your next steps.\n\nWhat would you like to work on first? You can also tap one of the suggestion chips below.`;
  }
  // Default
  return `Here's how I can help with "${txt}":\n\nI can give guidance on **college research and lists**, **SAT/ACT prep**, **essays** (coaching, not writing), **scholarships and FAFSA**, **deadlines and planning**, and **recommendation requests**.\n\nTry asking something like *"help me build a college list"* or *"what should I do this year?"* — or use the chips below. What's most on your mind right now?`;
}

async function sendChat() {
  const el = document.getElementById('chat-in');
  const txt = el?.value?.trim();
  if (!txt) return;
  el.value = '';
  S.chat.push({ role:'user', text:txt });

  const msgsEl = document.getElementById('chat-msgs');
  if (msgsEl) {
    msgsEl.innerHTML = renderMsgs() + `<div class="bubble ai"><div class="bubble-who">Advisor</div><div class="bubble-c think"><span></span><span></span><span></span></div></div>`;
    scrollChat();
  }

  const acct = S.user?.account;
  const ctx = acct
    ? `Student profile: Name: ${acct.name}, Grade: ${acct.grade}, Age: ${acct.age||'unknown'}, Interests: ${acct.interests.join(', ')||'not specified'}, Colleges considering: ${acct.colleges||'not specified'}, Test status: ${acct.testStatus||'not specified'}, Courses: ${acct.courses||'not specified'}. Today: ${MONTHS[CM]} ${CD}, ${CY}.`
    : `Student has not completed their profile yet. Today: ${MONTHS[CM]} ${CD}, ${CY}.`;

  const systemPrompt = `You are Pathfinder, a warm, practical AI academic advisor for high school students (grades 9–12). You are knowledgeable, encouraging, and direct.

${ctx}

Your role and guidelines:
- Give actionable, grade-appropriate advice tailored to this student's specific profile
- Always recommend FREE resources: Khan Academy, College Board, ACT Academy, Common App, FAFSA, Niche.com, BigFuture, QuestBridge, etc.
- NEVER write college essays for students. Instead, coach them on how to approach and write their own
- NEVER do homework. Explain concepts and guide thinking instead
- Be honest about competitive realities while remaining encouraging and supportive
- Keep responses focused and clear (150–220 words unless a structured plan is genuinely needed)
- Use a warm mentor tone — not robotic or clinical
- When relevant, mention Pathfinder's Scholarships, Internships, or Calendar pages
- Format with **bold** for key terms and line breaks for readability
- End with a brief follow-up question or next action step to keep the student moving forward`;

  let reply = null;
  try {
    // Call YOUR backend proxy. Build it to hold the API key server-side and forward to Anthropic.
    // Expected response shape: { reply: "..." }  (or { content:[{text:"..."}] })
    const messages = S.chat
      .filter(m => m.role === 'user' || m.role === 'ai')
      .map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.text }));

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: systemPrompt, messages, model: 'claude-sonnet-4-20250514', max_tokens: 1000 }),
    });

    if (res.ok) {
      const data = await res.json().catch(() => null);
      if (data) {
        reply = data.reply
          || (Array.isArray(data.content) ? data.content.map(b => b.text || '').join('') : null)
          || null;
      }
    }
  } catch (err) {
    // Network error or no backend present — fall through to offline advisor.
    console.warn('No /api/chat backend reachable; using offline advisor.', err?.message || err);
  }

  if (!reply) reply = advisorFallback(txt); // smart contextual fallback — never a dead state
  S.chat.push({ role:'ai', text: reply });

  if (msgsEl) { msgsEl.innerHTML = renderMsgs(); scrollChat(); }
}

/* setup setters */
function tpSetTest(t)    { S.testprep.setup.test = t; const s=TP_SECTIONS[t]; if(!s.includes(S.testprep.setup.section)) S.testprep.setup.section=s[0]; tpRenderSetup(document.getElementById('content')); }
function tpSetSection(s) { S.testprep.setup.section = s; tpRenderSetup(document.getElementById('content')); }
function tpSetMode(m)    { S.testprep.setup.mode = m; tpRenderSetup(document.getElementById('content')); }
function tpSetCount(n)   { S.testprep.setup.count = n; tpRenderSetup(document.getElementById('content')); }

function tpGoSetup()     { tpClearTimer(); S.testprep.screen='setup'; pTestPrep(); }
function tpGoDashboard() { tpClearTimer(); S.testprep.screen='dashboard'; pTestPrep(); }

/* ─── START QUIZ ─── */
function tpShuffle(arr) { const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function tpStart() {
  const su = S.testprep.setup;
  let pool = TP_BANK.filter(q => q.test===su.test && q.section===su.section);
  pool = tpShuffle(pool);
  // If not enough unique questions, cycle through to reach requested count
  let questions = [];
  if (pool.length === 0) {
    alert('No questions available for that section yet.');
    return;
  }
  while (questions.length < su.count) {
    questions = questions.concat(pool);
  }
  questions = questions.slice(0, su.count);

  const q = S.activeQuiz;
  q.questions = questions;
  q.currentIdx = 0;
  q.score = 0;
  q.answers = [];           // {selected, correct(bool)}
  q.mode = su.mode;
  q.section = su.section;
  q.test = su.test;
  q.locked = false;
  q.selected = null;
  q.startedAt = Date.now();
  q.totalTime = su.mode==='timed' ? Math.round(su.count * 90) : 0; // 1.5 min = 90s per Q
  q.timeRemaining = q.totalTime;

  tpClearTimer();
  if (su.mode === 'timed') {
    q.timer = setInterval(tpTick, 1000);
  }
  S.testprep.screen = 'quiz';
  pTestPrep();
}

function tpTick() {
  const q = S.activeQuiz;
  q.timeRemaining--;
  const el = document.getElementById('tp-timer');
  if (el) {
    el.textContent = tpFmtTime(q.timeRemaining);
    el.classList.toggle('warn', q.timeRemaining <= 30);
  }
  if (q.timeRemaining <= 0) {
    tpClearTimer();
    tpFinish(true); // time up — auto-end
  }
}

function tpFmtTime(s) {
  s = Math.max(0, s);
  const m = Math.floor(s/60), sec = s%60;
  return `${m}:${sec<10?'0':''}${sec}`;
}

/* ─── QUIZ SCREEN ─── */
function tpRenderQuiz(c) {
  const q = S.activeQuiz;
  const item = q.questions[q.currentIdx];
  const num = q.currentIdx + 1;
  const total = q.questions.length;
  const pct = Math.round(((num-1)/total)*100);
  const letters = ['A','B','C','D'];

  c.innerHTML = `<div class="page">
    <div class="card">
      <div class="tp-quiz-head">
        <div class="tp-qcount">Question ${num} of ${total}</div>
        ${q.mode==='timed' ? `<div class="tp-timer ${q.timeRemaining<=30?'warn':''}" id="tp-timer-wrap"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3L2 6"/><path d="M22 6l-3-3"/></svg><span id="tp-timer">${tpFmtTime(q.timeRemaining)}</span></div>` : `<span class="badge b-ink">Untimed</span>`}
      </div>
      <div class="prog-track mb20"><div class="prog-fill" style="width:${pct}%"></div></div>

      <div class="tp-qmeta">${q.test} · ${q.section}</div>
      ${item.passage ? `<div class="tp-qpassage">${item.passage}</div>` : ''}
      <div class="tp-qtext">${item.q.replace(/\n/g,'<br>')}</div>

      <div class="tp-opts" id="tp-opts">
        ${item.choices.map((ch,i)=>`
          <button class="tp-opt" id="tp-opt-${i}" onclick="tpSelect(${i})">
            <span class="tp-opt-letter">${letters[i]}</span>
            <span class="tp-opt-text">${ch}</span>
            <span class="tp-opt-mark" id="tp-mark-${i}"></span>
          </button>
        `).join('')}
      </div>

      <div id="tp-explain-slot"></div>

      <div class="tp-quiz-foot">
        <button class="btn btn-ghost btn-sm" onclick="tpQuit()" style="color:var(--ink-400)">Quit session</button>
        <div id="tp-action-slot">
          <button class="btn btn-primary" id="tp-submit-btn" onclick="tpSubmit()" disabled style="opacity:.5">Submit Answer</button>
        </div>
      </div>
    </div>
  </div>`;

  // restore selection visual if returning (not typical, but safe)
  q.selected = null;
  q.locked = false;
}

/* select an option (pre-submit) */
function tpSelect(i) {
  const q = S.activeQuiz;
  if (q.locked) return;
  q.selected = i;
  document.querySelectorAll('.tp-opt').forEach((el,idx)=>el.classList.toggle('sel', idx===i));
  const btn = document.getElementById('tp-submit-btn');
  if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
}

/* submit -> grade + explanation */
function tpSubmit() {
  const q = S.activeQuiz;
  if (q.locked || q.selected==null) return;
  q.locked = true;
  const item = q.questions[q.currentIdx];
  const isRight = q.selected === item.correct;
  if (isRight) q.score++;
  q.answers.push({ selected:q.selected, correct:isRight, qIdx:q.currentIdx });

  const okSvg = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
  const xSvg  = `<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

  document.querySelectorAll('.tp-opt').forEach((el,idx)=>{
    el.classList.add('locked');
    el.classList.remove('sel');
    const mark = document.getElementById('tp-mark-'+idx);
    if (idx === item.correct) { el.classList.add('correct'); if(mark) mark.innerHTML = okSvg; }
    else if (idx === q.selected) { el.classList.add('incorrect'); if(mark) mark.innerHTML = xSvg; }
  });

  // explanation block
  const slot = document.getElementById('tp-explain-slot');
  if (slot) {
    slot.innerHTML = `
      <div class="tp-explain ${isRight?'right':'wrong'}">
        <div class="tp-explain-head">
          ${isRight ? `${okSvg.replace('viewBox','width="16" height="16" viewBox')} Correct!` : `${xSvg.replace('viewBox','width="16" height="16" viewBox')} Not quite — here's why`}
        </div>
        <div class="tp-explain-body">${item.explain.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>
      </div>`;
  }

  // swap action button to Next / Finish
  const action = document.getElementById('tp-action-slot');
  const isLast = q.currentIdx >= q.questions.length - 1;
  if (action) {
    action.innerHTML = isLast
      ? `<button class="btn btn-sage" onclick="tpFinish(false)">See Results →</button>`
      : `<button class="btn btn-primary" onclick="tpNext()">Next Question →</button>`;
  }
}

function tpNext() {
  const q = S.activeQuiz;
  if (q.currentIdx < q.questions.length - 1) {
    q.currentIdx++;
    tpRenderQuiz(document.getElementById('content'));
  } else {
    tpFinish(false);
  }
}

function tpQuit() {
  if (!confirm('Quit this practice session? Your progress won\'t be saved.')) return;
  tpClearTimer();
  S.testprep.screen = 'dashboard';
  pTestPrep();
}

/* ─── FINISH / RESULTS ─── */
function tpFinish(timeUp) {
  const q = S.activeQuiz;
  tpClearTimer();
  q.endedAt = Date.now();
  q.timeUp = !!timeUp;
  // log to user history if signed in
  if (S.user) {
    if (!S.user.tpHistory) S.user.tpHistory = [];
    S.user.tpHistory.push({
      test:q.test, section:q.section, score:q.score, total:q.questions.length,
      answered:q.answers.length, mode:q.mode, at:Date.now(),
    });
    saveUser();
  }
  S.testprep.screen = 'results';
  pTestPrep();
}

function tpRenderResults(c) {
  const q = S.activeQuiz;
  const total = q.questions.length;

  let verdict, vColor;

  else if (acc >= 40) { verdict = 'Keep practicing';vColor = 'var(--gold-700)'; }

  c.innerHTML = `<div class="page">
    <div class="card mb20" style="text-align:center;background:linear-gradient(135deg,var(--azure-50),#f8fbff);border-color:var(--azure-200)">
      <div style="font-family:var(--font-display);font-size:15px;font-weight:700;color:${vColor};letter-spacing:0.5px;text-transform:uppercase">${verdict}</div>
      <div style="font-family:var(--font-display);font-size:52px;font-weight:700;color:var(--ink-900);line-height:1.1;margin:6px 0">${score}<span style="color:var(--ink-300)">/${total}</span></div>
      <div class="muted" style="font-size:13px">${q.test} · ${q.section} · ${q.mode==='timed'?'Timed':'Untimed'}${q.timeUp?' · ⏱ time expired':''}</div>
    </div>

    <div class="g4 mb20">
      <div class="stat"><div class="stat-lbl">Score</div><div class="stat-val">${score}/${total}</div><div class="stat-hint">${total-answered>0?`${total-answered} unanswered`:'all answered'}</div></div>
      <div class="stat"><div class="stat-lbl">Accuracy</div><div class="stat-val">${acc}%</div><div class="prog-track"><div class="prog-fill" style="width:${acc}%"></div></div></div>
      <div class="stat"><div class="stat-lbl">Time Spent</div><div class="stat-val" style="font-size:22px">${tpFmtTime(elapsed)}</div><div class="stat-hint">~${avgPer}s per question</div></div>
      <div class="stat"><div class="stat-lbl">Mode</div><div class="stat-val" style="font-size:22px">${q.mode==='timed'?'Timed':'Practice'}</div><div class="stat-hint">${q.test} ${q.section}</div></div>
    </div>

    <div class="card mb20">
      <div class="card-header"><div class="card-title">Question Breakdown</div><span class="badge ${acc>=65?'b-sage':'b-gold'}">${score} correct</span></div>
      ${q.answers.map((a,i)=>{
        const item = q.questions[a.qIdx];
        return `<div class="check" style="align-items:flex-start">
          <div class="chk-box on" style="background:${a.correct?'var(--sage-500)':'var(--crimson-600)'};border-color:${a.correct?'var(--sage-500)':'var(--crimson-600)'}">

          </div>
          <div style="flex:1">
            <div class="chk-lbl" style="font-size:13px">Q${i+1}. ${item.q.split('\n')[0].slice(0,90)}${item.q.length>90?'…':''}</div>
            <div class="chk-meta">${a.correct?'Correct':'Your answer: '+['A','B','C','D'][a.selected]+' · Correct: '+['A','B','C','D'][item.correct]}</div>
          </div>
        </div>`;
      }).join('')}
      ${total>answered?`<div class="chk-meta" style="padding-top:10px">${total-answered} question${total-answered!==1?'s':''} left unanswered (time expired).</div>`:''}
    </div>

    <div class="flex" style="gap:10px;flex-wrap:wrap">
      <button class="btn btn-gold" onclick="tpGoSetup()">Practice Again →</button>
      <button class="btn btn-outline" onclick="tpGoDashboard()">Return to Prep Dashboard</button>
    </div>
  </div>`;

/* ─── CUSTOM EVENTS (per signed-in user, persisted on the account) ─── */
/* Stored as S.user.eventsMap = { "YYYY-M-D": [ {id,name,type,custom:true}, ... ] } */
function getEventsMap() {
  if (!S.user) return {};
  if (!S.user.eventsMap) S.user.eventsMap = {};
  return S.user.eventsMap;
}
function evKey(y, m, d) { return `${y}-${m}-${d}`; }
function getCustomEventsFor(y, m, d) {
  const map = getEventsMap();
  return (map[evKey(y, m, d)] || []).map(e => ({ ...e, year: y, month: m, day: d, custom: true }));
}
function allCustomEvents() {
  const map = getEventsMap();
  const out = [];
  Object.keys(map).forEach(k => {
    const [y, m, d] = k.split('-').map(Number);
    (map[k] || []).forEach(e => out.push({ ...e, year: y, month: m, day: d, custom: true }));
  });
  return out;
}
function addCustomEvent(y, m, d, name, type) {
  if (!S.user) { showAuthModal('signup'); return; }
  const map = getEventsMap();
  const k = evKey(y, m, d);
  if (!map[k]) map[k] = [];
  map[k].push({ id: 'ce_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7), name, type });
  saveUser();
}
function deleteCustomEvent(y, m, d, id) {
  const map = getEventsMap();
  const k = evKey(y, m, d);
  if (!map[k]) return;
  map[k] = map[k].filter(e => e.id !== id);
  if (map[k].length === 0) delete map[k];
  saveUser();
  pCalendar();
}

/* ─── ADD-EVENT POPUP MODAL ─── */
function openAddEventModal(y, m, d) {
  if (!S.user) { showAuthModal('signup'); return; }
  const existing = document.getElementById('ev-modal');
  if (existing) existing.remove();
  const wrap = document.createElement('div');

  wrap.innerHTML = `
    <div class="modal" style="max-width:420px" onclick="event.stopPropagation()">
      <div class="modal-logo"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
      <h2>Add Event</h2>
      <p class="modal-sub">${MONTHS[m]} ${d}, ${y}</p>

        </select>
