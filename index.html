    </div>`;
  document.body.appendChild(wrap);
  setTimeout(() => document.getElementById('ev-name')?.focus(), 60);
}
function closeEventModal() {
  const m = document.getElementById('ev-modal');
  if (m) m.remove();
}
function submitAddEvent(y, m, d) {
  const name = document.getElementById('ev-name')?.value?.trim();
  const type = document.getElementById('ev-type')?.value || 'custom';
  if (!name) {
    const msg = document.getElementById('ev-modal-msg');
    if (msg) msg.innerHTML = `<div class="auth-msg err" style="margin-top:4px">Please enter an event name.</div>`;
    return;
  }
  addCustomEvent(y, m, d, name, type);
  closeEventModal();
  S.calSelectedDay = d;
  pCalendar();
}

/* ═══════════════════ CALENDAR ═══════════════════ */
function pCalendar() {
  const grade = S.user?.account?.grade || null;
  const baseEvents = buildCalEvents(grade);
  const customEvents = allCustomEvents();
  const allEvents = baseEvents.concat(customEvents);
  const vy = S.calViewYear, vm = S.calViewMonth;
  const firstDay = new Date(vy,vm,1).getDay();
  const daysInMonth = new Date(vy,vm+1,0).getDate();
  const daysInPrev = new Date(vy,vm,0).getDate();

  let cells = [];
  for (let i=firstDay-1;i>=0;i--) cells.push({d:daysInPrev-i,cur:false});
  for (let d=1;d<=daysInMonth;d++) cells.push({d,cur:true});
  while (cells.length<42) cells.push({d:cells.length-firstDay-daysInMonth+1,cur:false});

  const monthEvs = allEvents.filter(e=>e.year===vy&&e.month===vm);
  const byDay = {};
  monthEvs.forEach(e=>{ if(!byDay[e.day]) byDay[e.day]=[]; byDay[e.day].push(e); });

  const sel = S.calSelectedDay;
  let panelEvs, panelTitle, panelDayForAdd = null;
  if (sel) {
    panelEvs = (byDay[sel] || []).slice().sort((a,b)=> (a.custom?1:0)-(b.custom?1:0));
    panelTitle = `${MONTHS[vm]} ${sel}, ${vy}`;
    panelDayForAdd = sel;
  } else {
    panelEvs = monthEvs.slice().sort((a,b)=>a.day-b.day);
    panelTitle = `All events — ${MONTHS[vm]} ${vy}`;
  }

  const today = new Date(CY,CM,CD);
  const cutoff = new Date(CY,CM,CD+30);
  const upcoming = allEvents
    .filter(e=>{ const d=new Date(e.year,e.month,e.day); return d>=today && d<=cutoff; })
    .sort((a,b)=>new Date(a.year,a.month,a.day)-new Date(b.year,b.month,b.day));

  const tc = {test:'var(--azure-400)',scholarship:'var(--gold-400)',program:'var(--sage-400)',school:'var(--ink-500)',custom:'var(--crimson-600)'};

  const renderEvRow = (e, allowDelete) => `
    <div class="ev-item ${e.type}${isPast(e)?' past':''}">
      <div class="ev-item-row">
        <div class="ev-date-block">
          <div class="ev-day-num">${e.day}</div>
          <div class="ev-mon-abbr">${MONTHS_S[e.month]}</div>
        </div>
        <div style="flex:1">
          <div class="ev-name">${e.name}${e.custom?'<span class="ev-custom-tag">mine</span>':''}</div>
          <div class="ev-type">${e.type}</div>
          ${isPast(e)?'<div class="ev-past-label">Past deadline</div>':''}
        </div>
        ${(allowDelete && e.custom) ? `<button class="ev-del" title="Delete event" onclick="deleteCustomEvent(${e.year},${e.month},${e.day},'${e.id}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>` : ''}
      </div>
    </div>`;

  const c = document.getElementById('content');
  c.innerHTML = `<div class="page">
    <div class="card mb16" style="background:var(--ink-25);border-color:var(--ink-100)">
      <div style="font-size:13px;color:var(--ink-600)">${grade ? `Showing deadlines for <strong>Grade ${grade}</strong> — ${baseEvents.length} built-in events this school year.` : `Showing all deadlines. <a href="#" onclick="nav('profile')">Set up a profile</a> to see only dates relevant to your grade.`} ${S.user ? `Click any day to add your own.` : `<a href="#" onclick="showAuthModal('signup')">Sign in</a> to add your own events.`}</div>
    </div>

    <div class="g2" style="align-items:start">
      <div class="card">
        <div class="card-header" style="margin-bottom:14px">
          <div class="card-title">${MONTHS[vm]} ${vy}</div>
          <div style="display:flex;align-items:center;gap:4px">
            <button class="btn btn-ghost btn-sm" onclick="calNav(-1)" style="padding:6px 9px">${IC.chevL}</button>
            <button class="btn btn-ghost btn-sm" onclick="calGoToday()">Today</button>
            <button class="btn btn-ghost btn-sm" onclick="calNav(1)" style="padding:6px 9px">${IC.chevR}</button>
          </div>
        </div>
        <div class="cal-grid mb8">
          ${DAYS.map(d=>`<div class="cal-hdr">${d}</div>`).join('')}
          ${cells.map(cell=>{
            const hasEv = cell.cur && byDay[cell.d]?.length>0;
            const isToday = cell.cur && vy===CY && vm===CM && cell.d===CD;
            const isSel = cell.cur && sel===cell.d && !isToday;
            return `<div class="cal-day ${!cell.cur?'other':''} ${isToday?'today':''} ${isSel?'selected':''} ${hasEv?'has-ev':''}"
              onclick="${cell.cur?`calSelectDay(${cell.d})`:''}">
              ${cell.d}
            </div>`;
          }).join('')}
        </div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;border-top:1px solid var(--ink-50);padding-top:12px">
          ${[['test','Tests'],['scholarship','Scholarships'],['program','Programs'],['school','School'],['custom','Mine']].map(([t,l])=>`
            <div style="display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink-400)">
              <div style="width:8px;height:8px;border-radius:50%;background:${tc[t]}"></div>${l}
            </div>
          `).join('')}
        </div>
      </div>

      <div>
        <div class="card mb12">
          <div class="flex-b" style="margin-bottom:12px">
            <div class="selected-date-label" style="margin-bottom:0;border-bottom:none;padding-bottom:0">${panelTitle}</div>
            ${panelDayForAdd!==null ? `<button class="btn btn-azure btn-xs" onclick="openAddEventModal(${vy},${vm},${panelDayForAdd})" style="gap:5px"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add</button>` : ''}
          </div>
          ${panelEvs.length===0
            ? `<div style="font-size:13px;color:var(--ink-300);padding:14px 0;text-align:center">No events${sel?' on this date':' this month'}.${(sel&&S.user)?`<br><button class="btn btn-outline btn-xs" style="margin-top:10px" onclick="openAddEventModal(${vy},${vm},${sel})">Add one</button>`:''}</div>`
            : `<div class="cal-events-panel">
              ${panelEvs.map(e=>renderEvRow(e, true)).join('')}
            </div>`
          }
          ${sel?`<button class="btn btn-ghost btn-xs" onclick="S.calSelectedDay=null;pCalendar()" style="margin-top:8px;color:var(--ink-400)">Clear selection</button>`:''}
        </div>

        ${upcoming.length ? `
          <div class="card">
            <div class="selected-date-label">Next 30 days</div>
            ${upcoming.map(e=>renderEvRow(e, false)).join('')}
          </div>
        ` : `
          <div class="card">
            <div class="selected-date-label">Next 30 days</div>
            <div style="font-size:13px;color:var(--ink-300);padding:10px 0;text-align:center">No upcoming deadlines in the next 30 days.</div>
          </div>
        `}
      </div>
    </div>
  </div>`;
}

function calNav(dir) {
  let m = S.calViewMonth+dir, y = S.calViewYear;
  if(m>11){m=0;y++;} if(m<0){m=11;y--;}
  S.calViewMonth=m; S.calViewYear=y; S.calSelectedDay=null; pCalendar();
}
function calGoToday() { S.calViewMonth=CM; S.calViewYear=CY; S.calSelectedDay=CD; pCalendar(); }
function calSelectDay(day) { S.calSelectedDay = S.calSelectedDay===day ? null : day; pCalendar(); }

/* ═══════════════════ COLLEGE SEARCH STATE ═══════════════════ */
S.colSearch = '';
S.colFilter = 'all';

/* College list categories with colors */
const COL_CATS = [
  {id:'reach', label:'Reach', color:'var(--crimson-600)', bg:'var(--crimson-100)'},
  {id:'match', label:'Match', color:'var(--azure-600)', bg:'var(--azure-100)'},

];

/* Known domains for reliable logo hits (logo.clearbit.com/<domain>).
   Any school not listed derives a best-guess domain; misses fall back to initials. */
const COL_DOMAINS = {
  'Harvard University':'harvard.edu','Stanford University':'stanford.edu','Massachusetts Institute of Technology':'mit.edu',
  'Yale University':'yale.edu','Princeton University':'princeton.edu','Columbia University':'columbia.edu',
  'University of Pennsylvania':'upenn.edu','Brown University':'brown.edu','Dartmouth College':'dartmouth.edu',

  'University of Notre Dame':'nd.edu','Georgetown University':'georgetown.edu','Emory University':'emory.edu',
  'Carnegie Mellon University':'cmu.edu','University of Southern California':'usc.edu','New York University':'nyu.edu',
  'Tufts University':'tufts.edu','Boston College':'bc.edu','Boston University':'bu.edu','Northeastern University':'northeastern.edu',
  'Georgia Institute of Technology':'gatech.edu','University of California, Berkeley':'berkeley.edu',
  'University of California, Los Angeles':'ucla.edu','University of California, San Diego':'ucsd.edu',
  'University of Michigan':'umich.edu','University of Virginia':'virginia.edu','University of North Carolina at Chapel Hill':'unc.edu',
  'University of Texas at Austin':'utexas.edu','University of Florida':'ufl.edu','University of Wisconsin-Madison':'wisc.edu',
  'University of Illinois Urbana-Champaign':'illinois.edu','University of Washington':'washington.edu',
  'Ohio State University':'osu.edu','Pennsylvania State University':'psu.edu','Purdue University':'purdue.edu',
  'University of Maryland, College Park':'umd.edu','Michigan State University':'msu.edu','Rutgers University':'rutgers.edu',
  'University of Notre Dame ':'nd.edu','Howard University':'howard.edu','Spelman College':'spelman.edu',
  'Morehouse College':'morehouse.edu','Amherst College':'amherst.edu','Williams College':'williams.edu',
  'Swarthmore College':'swarthmore.edu','Pomona College':'pomona.edu','Wellesley College':'wellesley.edu',
  'Texas A&M University':'tamu.edu','Arizona State University':'asu.edu','University of Georgia':'uga.edu',
  'University of Notre Dame':'nd.edu','Cal Poly San Luis Obispo':'calpoly.edu','Villanova University':'villanova.edu'
};

function colDomain(name){
  if (COL_DOMAINS[name]) return COL_DOMAINS[name];
  // Heuristic: strip punctuation, take meaningful words, join, add .edu
  const skip = new Set(['of','the','at','and','&','university','college','institute','school','state']);
  const words = name.toLowerCase()
    .replace(/[^a-z0-9\s]/g,'')
    .split(/\s+/)
    .filter(w=>w && !skip.has(w));
  if (!words.length) return null;
  // best guess: first 1-2 significant words
  return words.slice(0, words.length>1?2:1).join('') + '.edu';
}

/* Returns a .col-logo element: an <img> that falls back to an initials box on error. */
function colLogoHtml(name){
  const color = colLogoColor(name);
  const initials = colInitials(name);
  const dom = colDomain(name);
  const safeInit = initials.replace(/'/g,"");
  if (!dom) {
    return `<div class="col-logo" style="background:${color}">${initials}</div>`;
  }
  const src = `https://logo.clearbit.com/${dom}?size=80`;
  // onerror swaps the <img> for the colored initials box, preserving layout
  return `<div class="col-logo col-logo-img" style="background:${color}">`
    + `<img src="${src}" alt="${name.replace(/"/g,'')}" loading="lazy" referrerpolicy="no-referrer" `
    + `onerror="this.parentNode.classList.remove('col-logo-img');this.parentNode.textContent='${safeInit}';">`
    + `</div>`;
}
function colLogoColor(name){
  // deterministic color from name
  const palette = ['var(--azure-500)','var(--sage-500)','var(--gold-500)','var(--azure-600)','var(--sage-600)','var(--ink-700)'];
  let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))>>>0;
  return palette[h % palette.length];
}
function colInitials(name){
  const skip = new Set(['of','the','at','and','&']);
  const words = name.split(/\s+/).filter(w=>!skip.has(w.toLowerCase()));
  return (words.slice(0,2).map(w=>w[0]).join('')||name[0]).toUpperCase();
}

/* myColleges stored on the user account; guests use a session field */
function getMyColleges(){
  if (S.user) { if(!S.user.myColleges) S.user.myColleges = []; return S.user.myColleges; }
  if (!S._guestColleges) S._guestColleges = [];
  return S._guestColleges;
}
function saveMyColleges(){
  if (S.user && !S.user.isGuest) saveUser();
}
function isCollegeAdded(name){ return getMyColleges().some(c=>c.n===name); }

function addCollege(name){
  const col = COLLEGES.find(c=>c.n===name);
  if (!col) return;
  const list = getMyColleges();
  if (list.some(c=>c.n===name)) return;
  list.push({ n:col.n, loc:col.loc, type:col.type, desc:col.desc, cat:'interested' });
  saveMyColleges();
  pColleges();
}
function removeCollege(name){
  const list = getMyColleges();
  const idx = list.findIndex(c=>c.n===name);
  if (idx>=0) list.splice(idx,1);
  saveMyColleges();
  pColleges();
}
/* application status for a saved college (bonus feature) */
const APP_STATUSES = ['Not Started','In Progress','Submitted'];
function setCollegeStatus(name, status){
  const c = getMyColleges().find(x=>x.n===name);
  if (c){ c.status = status; saveMyColleges(); }
}
function statusColor(status){
  if (status==='Submitted')   return {color:'var(--sage-700)', bg:'var(--sage-100)'};
  if (status==='In Progress') return {color:'var(--gold-700)', bg:'var(--gold-100)'};
  return {color:'var(--ink-600)', bg:'var(--ink-100)'}; // Not Started
}

function setCollegeCat(name, cat){
  const c = getMyColleges().find(x=>x.n===name);
  if (c){ c.cat = cat; saveMyColleges(); }
}
function toggleCollege(name){
  isCollegeAdded(name) ? removeCollege(name) : addCollege(name);
}

function onColSearch(v){
  S.colSearch = v;
  // only re-render the results list to keep input focus
  const el = document.getElementById('col-results');
  if (el) el.innerHTML = renderColResults();
}
function setColFilter(f){ S.colFilter = f; pColleges(); }

function renderColResults(){
  const q = S.colSearch.trim().toLowerCase();
  let list = COLLEGES;
  if (S.colFilter !== 'all') list = list.filter(c=>c.type===S.colFilter);
  if (q) list = list.filter(c => c.n.toLowerCase().includes(q) || c.loc.toLowerCase().includes(q));
  list = list.slice(0, 120); // cap rendered rows for performance
  if (!list.length) return `<div class="col-empty">No colleges match "${S.colSearch}". Try another name or city.</div>`;
  return list.map(c=>{
    const added = isCollegeAdded(c.n);
    const rateChip = c.acceptanceRate
      ? `<span class="col-rate" title="Acceptance rate">${IC.pulse||''}${c.acceptanceRate} accept.</span>`
      : '';
    return `<div class="col-row">
      ${colLogoHtml(c.n)}
      <div class="col-info">
        <div class="col-name">${c.n}</div>
        <div class="col-meta">${c.loc} · ${c.type}${rateChip}</div>
        <div class="col-desc">${c.desc}</div>
      </div>
      <div class="col-actions">
        ${added ? `<button class="col-info-btn" title="More info" onclick="showCollegeInfo('${c.n.replace(/'/g,"\\'")}')">${IC.info||'i'}</button>` : ''}
        <button class="col-add-btn ${added?'added':''}" title="${added?'Remove from my list':'Add to my list'}" onclick="toggleCollege('${c.n.replace(/'/g,"\\'")}')">
          ${added
            ? `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`
            : `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`}
        </button>
      </div>
    </div>`;
  }).join('');
}

/* ─── COLLEGE INFO MODAL (shown via the conditional Info button) ─── */
function showCollegeInfo(name){
  const c = COLLEGES.find(x=>x.n===name);
  if (!c) return;
  const saved = getMyColleges().find(x=>x.n===name);
  const cat = saved ? (COL_CATS.find(k=>k.id===(saved.cat||'interested'))||COL_CATS[3]) : null;

  const existing = document.getElementById('col-info-modal');
  if (existing) existing.remove();
  const wrap = document.createElement('div');
  wrap.className = 'modal-bg';
  wrap.id = 'col-info-modal';
  wrap.onclick = closeCollegeInfo;
  wrap.innerHTML = `
    <div class="modal" style="max-width:460px" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">

          <div style="font-size:12.5px;color:var(--ink-400);margin-top:2px">${c.loc} · ${c.type}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
        ${c.acceptanceRate?`<span class="badge b-azure">${c.acceptanceRate} acceptance</span>`:''}
        ${cat?`<span class="col-cat-pill" style="color:${cat.color};background:${cat.bg};margin-left:0">${cat.label}</span>`:''}
        <span class="badge b-ink">${status}</span>
      </div>
      <div style="font-size:13.5px;line-height:1.7;color:var(--ink-700);background:var(--ink-25);border:1px solid var(--ink-100);border-radius:var(--r-md);padding:14px 16px">${c.desc}</div>
      <button class="btn btn-primary w100" style="justify-content:center;margin-top:18px" onclick="closeCollegeInfo()">Close</button>
    </div>`;
  document.body.appendChild(wrap);
}
function closeCollegeInfo(){
  const m = document.getElementById('col-info-modal');
  if (m) m.remove();
}

/* ═══════════════════ DAILY TO-DO CHECKLIST ═══════════════════ */
/* Persisted to localStorage. Per-user key when signed in, else a shared guest key. */
S.todoInput = '';

function todoKey(){
  const who = S.user ? S.user.email.toLowerCase() : 'guest';
  return 'pf_todos_' + who;
}
function loadTodos(){
  try { return JSON.parse(localStorage.getItem(todoKey())) || []; } catch { return []; }
}
function saveTodos(list){
  try { localStorage.setItem(todoKey(), JSON.stringify(list)); } catch {}
}
function addTodo(){
  const el = document.getElementById('todo-input');
  const text = (el?.value || '').trim();
  if (!text) return;
  const list = loadTodos();
  list.unshift({ id:'t_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), text, done:false, at:Date.now() });
  saveTodos(list);
  S.todoInput = '';
  pTodo();
}
function toggleTodo(id){
  const list = loadTodos();
  const t = list.find(x=>x.id===id);
  if (t){ t.done = !t.done; saveTodos(list); }
  pTodo();
}
function deleteTodo(id){
  saveTodos(loadTodos().filter(x=>x.id!==id));
  pTodo();
}
function clearDoneTodos(){
  saveTodos(loadTodos().filter(x=>!x.done));
  pTodo();
}
function todoKeydown(e){ if(e.key==='Enter'){ e.preventDefault(); addTodo(); } }

function pTodo(){
  const c = document.getElementById('content');
  const list = loadTodos();
  const done = list.filter(t=>t.done).length;
  const total = list.length;
  const pct = total ? Math.round((done/total)*100) : 0;

  c.innerHTML = `<div class="page">
    <div class="g4 mb20">
      <div class="stat"><div class="stat-lbl">Tasks</div><div class="stat-val">${total}</div><div class="stat-hint">on your list</div></div>
      <div class="stat"><div class="stat-lbl">Completed</div><div class="stat-val">${done}</div><div class="stat-hint">${total-done} remaining</div></div>
      <div class="stat"><div class="stat-lbl">Progress</div><div class="stat-val">${pct}%</div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div></div>
      <div class="stat"><div class="stat-lbl">Saved</div><div class="stat-val" style="font-size:18px">${S.user?'Account':'This device'}</div><div class="stat-hint">${S.user?'synced to you':'sign in to sync'}</div></div>
    </div>

    <div class="card mb20">
      <div class="card-header" style="margin-bottom:14px">
        <div><div class="card-title">Daily To-Do</div><div class="card-sub">Track what you need to get done</div></div>
        ${done?`<button class="btn btn-ghost btn-sm" onclick="clearDoneTodos()" style="color:var(--ink-400)">Clear completed</button>`:''}
      </div>
      <div class="search-bar" style="margin-bottom:18px">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <input class="search-input" id="todo-input" type="text" placeholder="Add a task — e.g. Draft Common App essay, email Ms. Rivera..."
          value="${S.todoInput.replace(/"/g,'&quot;')}" oninput="S.todoInput=this.value" onkeydown="todoKeydown(event)" autocomplete="off">
        <button class="btn btn-azure btn-sm" onclick="addTodo()">Add</button>
      </div>

      ${total===0
        ? `<div class="empty-state"><div class="empty-state-big">Nothing here yet</div>Add your first task above to get started.</div>`
        : list.map(t=>`
          <div class="check">
            <div class="chk-box ${t.done?'on':''}" onclick="toggleTodo('${t.id}')">
              <svg viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3"/></svg>
            </div>
            <div style="flex:1">
              <div class="chk-lbl ${t.done?'done':''}">${t.text.replace(/</g,'&lt;')}</div>
            </div>
            <button class="ev-del" title="Delete task" onclick="deleteTodo('${t.id}')">
              <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
          </div>
        `).join('')
      }
    </div>
  </div>`;
}
